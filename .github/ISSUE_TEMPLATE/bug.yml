name: Bug
description: 记录一个实际问题，方便后续分析、修复或加入批量修复
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: current_behavior
    attributes:
      label: 当前问题
      description: 现在具体出了什么问题
      placeholder: 例如：点击保存后提示成功，但刷新页面后内容丢失
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: 期望结果
      description: 你本来希望它怎样工作
      placeholder: 例如：保存后刷新页面，内容仍然存在
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: 影响程度
      options:
        - 不急，先记下来
        - 影响体验，建议近期处理
        - 阻塞使用，需要优先处理
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 如何复现
      description: 能写就写，写不全也没关系
      placeholder: |
        1. 打开...
        2. 点击...
        3. 看到...
    validations:
      required: false

  - type: textarea
    id: evidence
    attributes:
      label: 补充信息
      description: 截图、报错、链接、日志都可以放这里
      placeholder: 例如：报错内容、页面链接、相关截图
    validations:
      required: false

  - type: input
    id: deadline
    attributes:
      label: 最晚处理时间
      description: 如果有明确 DDL，写在这里
      placeholder: 例如：2026-08-10
    validations:
      required: false

  - type: dropdown
    id: ai_next_action
    attributes:
      label: 希望 AI 下一步怎么做
      options:
        - 先分析原因
        - 直接修复并提交 PR
        - 先整理方案，稍后再改
        - 先记下来，之后批量处理
    validations:
      required: true

  - type: textarea
    id: done_definition
    attributes:
      label: 怎样算处理完成
      description: 不确定可以留空
      placeholder: 例如：保存后刷新不丢失，相关页面手测通过
    validations:
      required: false
